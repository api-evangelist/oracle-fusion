naftiko: 1.0.0-alpha2
info:
  label: Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Planning
  description: 'Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Planning. 2 operations. Lead operation: Oracle
    Fusion Cloud Applications Export a data slice. Self-contained Naftiko capability covering one Oracle Fusion business surface.'
  tags:
  - Oracle Fusion
  - Planning
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_FUSION_API_KEY: ORACLE_FUSION_API_KEY
capability:
  consumes:
  - type: http
    namespace: epm-planning
    baseUri: https://{instance}.oraclecloud.com
    description: Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Planning business capability. Self-contained,
      no shared references.
    resources:
    - name: HyperionPlanning-rest-v3-applications-applicationName-plantypes-planType-exportd
      path: /HyperionPlanning/rest/v3/applications/{applicationName}/plantypes/{planType}/exportdataslice
      operations:
      - name: exportdataslice
        method: POST
        description: Oracle Fusion Cloud Applications Export a data slice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationName
          in: path
          type: string
          required: true
        - name: planType
          in: path
          type: string
          description: Plan type name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: HyperionPlanning-rest-v3-applications-applicationName-plantypes-planType-importd
      path: /HyperionPlanning/rest/v3/applications/{applicationName}/plantypes/{planType}/importdataslice
      operations:
      - name: importdataslice
        method: POST
        description: Oracle Fusion Cloud Applications Import a data slice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationName
          in: path
          type: string
          required: true
        - name: planType
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_FUSION_API_KEY}}'
  exposes:
  - type: rest
    namespace: epm-planning-rest
    port: 8080
    description: REST adapter for Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Planning. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/hyperionplanning/rest/v3/applications/{applicationname}/plantypes/{plantype}/exportdataslice
      name: hyperionplanning-rest-v3-applications-applicationname-plantypes-plantype-exportd
      description: REST surface for HyperionPlanning-rest-v3-applications-applicationName-plantypes-planType-exportd.
      operations:
      - method: POST
        name: exportdataslice
        description: Oracle Fusion Cloud Applications Export a data slice
        call: epm-planning.exportdataslice
        with:
          applicationName: rest.applicationName
          planType: rest.planType
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hyperionplanning/rest/v3/applications/{applicationname}/plantypes/{plantype}/importdataslice
      name: hyperionplanning-rest-v3-applications-applicationname-plantypes-plantype-importd
      description: REST surface for HyperionPlanning-rest-v3-applications-applicationName-plantypes-planType-importd.
      operations:
      - method: POST
        name: importdataslice
        description: Oracle Fusion Cloud Applications Import a data slice
        call: epm-planning.importdataslice
        with:
          applicationName: rest.applicationName
          planType: rest.planType
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: epm-planning-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Planning. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: oracle-fusion-cloud-applications-export
      description: Oracle Fusion Cloud Applications Export a data slice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: epm-planning.exportdataslice
      with:
        applicationName: tools.applicationName
        planType: tools.planType
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-fusion-cloud-applications-import
      description: Oracle Fusion Cloud Applications Import a data slice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: epm-planning.importdataslice
      with:
        applicationName: tools.applicationName
        planType: tools.planType
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
