naftiko: 1.0.0-alpha2
info:
  label: Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Applications
  description: 'Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Applications. 4 operations. Lead operation:
    Oracle Fusion Cloud Applications List EPM applications. Self-contained Naftiko capability covering one Oracle Fusion business
    surface.'
  tags:
  - Oracle Fusion
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_FUSION_API_KEY: ORACLE_FUSION_API_KEY
capability:
  consumes:
  - type: http
    namespace: epm-applications
    baseUri: https://{instance}.oraclecloud.com
    description: Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Applications business capability. Self-contained,
      no shared references.
    resources:
    - name: HyperionPlanning-rest-v3-applications
      path: /HyperionPlanning/rest/v3/applications
      operations:
      - name: listapplications
        method: GET
        description: Oracle Fusion Cloud Applications List EPM applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: HyperionPlanning-rest-v3-applications-applicationName
      path: /HyperionPlanning/rest/v3/applications/{applicationName}
      operations:
      - name: getapplication
        method: GET
        description: Oracle Fusion Cloud Applications Get an EPM application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationName
          in: path
          type: string
          description: Application name
          required: true
    - name: HyperionPlanning-rest-v3-applications-applicationName-dimensions
      path: /HyperionPlanning/rest/v3/applications/{applicationName}/dimensions
      operations:
      - name: listdimensions
        method: GET
        description: Oracle Fusion Cloud Applications List dimensions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationName
          in: path
          type: string
          required: true
    - name: HyperionPlanning-rest-v3-applications-applicationName-dimensions-dimensionName-m
      path: /HyperionPlanning/rest/v3/applications/{applicationName}/dimensions/{dimensionName}/members
      operations:
      - name: listdimensionmembers
        method: GET
        description: Oracle Fusion Cloud Applications List dimension members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationName
          in: path
          type: string
          required: true
        - name: dimensionName
          in: path
          type: string
          description: Dimension name
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_FUSION_API_KEY}}'
  exposes:
  - type: rest
    namespace: epm-applications-rest
    port: 8080
    description: REST adapter for Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Applications. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/hyperionplanning/rest/v3/applications
      name: hyperionplanning-rest-v3-applications
      description: REST surface for HyperionPlanning-rest-v3-applications.
      operations:
      - method: GET
        name: listapplications
        description: Oracle Fusion Cloud Applications List EPM applications
        call: epm-applications.listapplications
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hyperionplanning/rest/v3/applications/{applicationname}
      name: hyperionplanning-rest-v3-applications-applicationname
      description: REST surface for HyperionPlanning-rest-v3-applications-applicationName.
      operations:
      - method: GET
        name: getapplication
        description: Oracle Fusion Cloud Applications Get an EPM application
        call: epm-applications.getapplication
        with:
          applicationName: rest.applicationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hyperionplanning/rest/v3/applications/{applicationname}/dimensions
      name: hyperionplanning-rest-v3-applications-applicationname-dimensions
      description: REST surface for HyperionPlanning-rest-v3-applications-applicationName-dimensions.
      operations:
      - method: GET
        name: listdimensions
        description: Oracle Fusion Cloud Applications List dimensions
        call: epm-applications.listdimensions
        with:
          applicationName: rest.applicationName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hyperionplanning/rest/v3/applications/{applicationname}/dimensions/{dimensionname}/members
      name: hyperionplanning-rest-v3-applications-applicationname-dimensions-dimensionname-m
      description: REST surface for HyperionPlanning-rest-v3-applications-applicationName-dimensions-dimensionName-m.
      operations:
      - method: GET
        name: listdimensionmembers
        description: Oracle Fusion Cloud Applications List dimension members
        call: epm-applications.listdimensionmembers
        with:
          applicationName: rest.applicationName
          dimensionName: rest.dimensionName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: epm-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Applications. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: oracle-fusion-cloud-applications-list
      description: Oracle Fusion Cloud Applications List EPM applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epm-applications.listapplications
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-fusion-cloud-applications-get
      description: Oracle Fusion Cloud Applications Get an EPM application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epm-applications.getapplication
      with:
        applicationName: tools.applicationName
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-fusion-cloud-applications-list-2
      description: Oracle Fusion Cloud Applications List dimensions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epm-applications.listdimensions
      with:
        applicationName: tools.applicationName
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-fusion-cloud-applications-list-3
      description: Oracle Fusion Cloud Applications List dimension members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epm-applications.listdimensionmembers
      with:
        applicationName: tools.applicationName
        dimensionName: tools.dimensionName
      outputParameters:
      - type: object
        mapping: $.
