naftiko: 1.0.0-alpha2
info:
  label: Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Migration
  description: 'Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Migration. 2 operations. Lead operation: Oracle
    Fusion Cloud Applications List snapshots. Self-contained Naftiko capability covering one Oracle Fusion business surface.'
  tags:
  - Oracle Fusion
  - Migration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_FUSION_API_KEY: ORACLE_FUSION_API_KEY
capability:
  consumes:
  - type: http
    namespace: epm-migration
    baseUri: https://{instance}.oraclecloud.com
    description: Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Migration business capability. Self-contained,
      no shared references.
    resources:
    - name: interop-rest-v3-snapshots
      path: /interop/rest/v3/snapshots
      operations:
      - name: listsnapshots
        method: GET
        description: Oracle Fusion Cloud Applications List snapshots
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: interop-rest-v3-snapshots-snapshotName
      path: /interop/rest/v3/snapshots/{snapshotName}
      operations:
      - name: deletesnapshot
        method: DELETE
        description: Oracle Fusion Cloud Applications Delete a snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: snapshotName
          in: path
          type: string
          description: Snapshot name
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_FUSION_API_KEY}}'
  exposes:
  - type: rest
    namespace: epm-migration-rest
    port: 8080
    description: REST adapter for Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Migration. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/interop/rest/v3/snapshots
      name: interop-rest-v3-snapshots
      description: REST surface for interop-rest-v3-snapshots.
      operations:
      - method: GET
        name: listsnapshots
        description: Oracle Fusion Cloud Applications List snapshots
        call: epm-migration.listsnapshots
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/interop/rest/v3/snapshots/{snapshotname}
      name: interop-rest-v3-snapshots-snapshotname
      description: REST surface for interop-rest-v3-snapshots-snapshotName.
      operations:
      - method: DELETE
        name: deletesnapshot
        description: Oracle Fusion Cloud Applications Delete a snapshot
        call: epm-migration.deletesnapshot
        with:
          snapshotName: rest.snapshotName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: epm-migration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Fusion Cloud Applications Oracle Fusion EPM REST API — Migration. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: oracle-fusion-cloud-applications-list
      description: Oracle Fusion Cloud Applications List snapshots
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epm-migration.listsnapshots
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-fusion-cloud-applications-delete
      description: Oracle Fusion Cloud Applications Delete a snapshot
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: epm-migration.deletesnapshot
      with:
        snapshotName: tools.snapshotName
      outputParameters:
      - type: object
        mapping: $.
