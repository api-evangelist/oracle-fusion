specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Oracle Fusion Cloud Applications
providerId: oracle-fusion
publisherName: Oracle America, Inc.
serviceCategory: SaaS Applications
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - ERP
  - HCM
  - SaaS
  - Oracle Cloud
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps view for Oracle Fusion Cloud Applications: per-pillar
  SaaS subscriptions billed monthly per Hosted Named User / Hosted Employee /
  Hosted Single-Sign-On Employee. REST API access is bundled with the
  pillar subscription. FinOps observation centres on per-pillar seat
  utilization rather than per-call consumption.
sources:
  - https://www.oracle.com/applications/cloud/
  - https://docs.oracle.com/en/cloud/saas/
notes: >-
  No per-API meter exists. Track license seat utilization per pillar (ERP,
  HCM, SCM, CX, EPM) through the Fusion Applications usage reports and
  reconcile against the contractual seat counts on each pillar order document.
billingModel:
  pricingCategory: Tiered Subscription (Per Pillar)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Oracle Fusion Cloud Applications
  ServiceCategory: SaaS Applications
  ProviderName: Oracle
  PublisherName: Oracle America, Inc.
  InvoiceIssuerName: Oracle America, Inc.
  BillingCurrency: USD
  PricingCategory: Subscription
  ChargeCategory: Purchase
meters:
  - name: hosted_named_user_subscription
    description: Active Hosted Named User seats per pillar per month
    unit: seat-month
    aggregation: max
    dimensions:
      - pillar
      - module
      - business_unit
  - name: hosted_employee_subscription
    description: Hosted Employee seats per pillar per month
    unit: employee-month
    aggregation: max
    dimensions:
      - pillar
      - module
      - business_unit
  - name: hosted_sso_employee_subscription
    description: Hosted Single-Sign-On Employee seats per month
    unit: employee-month
    aggregation: max
    dimensions:
      - pillar
      - module
  - name: rest_api_calls
    description: REST API calls (informational; bundled in the subscription)
    unit: request
    aggregation: sum
    dimensions:
      - pillar
      - api
      - endpoint
      - consumer
principles:
  - name: Visibility
    description: >-
      Review per-pillar seat utilization through the Fusion Applications
      Security Console and Manage Users area; reconcile monthly against the
      contractual seat counts captured on each pillar's order document.
  - name: Allocation
    description: >-
      Tag user records with pillar, business unit, and cost center so seat
      cost can be allocated back to consuming finance teams.
  - name: Optimization
    description: >-
      Reclaim inactive seats, consolidate duplicate user records across
      pillars, and use the lower-priced Hosted Employee or Hosted SSO
      Employee metrics for light-touch users where the module supports them.
  - name: Accountability
    description: >-
      Pair each pillar's applications administrator with a finance partner;
      review seat growth and renewal scoping at quarterly business reviews.
