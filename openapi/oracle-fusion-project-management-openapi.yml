      tags:
        - Change Orders
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Change orders retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChangeOrder'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createChangeOrder
      summary: Oracle Fusion Cloud Applications Create a change order
      description: Create a new project change order.
      tags:
        - Change Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOrderCreate'
      responses:
        '201':
          description: Change order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/changeOrders/{ChangeDocumentId}:
    get:
      operationId: getChangeOrder
      summary: Oracle Fusion Cloud Applications Get a change order
      description: Retrieve a specific change order record.
      tags:
        - Change Orders
      parameters:
        - name: ChangeDocumentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Change order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeOrder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateChangeOrder
      summary: Oracle Fusion Cloud Applications Update a change order
      description: Update an existing change order.
      tags:
        - Change Orders
      parameters:
        - name: ChangeDocumentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOrderCreate'
      responses:
        '200':
          description: Change order updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteChangeOrder
      summary: Oracle Fusion Cloud Applications Delete a change order
      description: Delete an existing change order.
      tags:
        - Change Orders
      parameters:
        - name: ChangeDocumentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Change order deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /fscmRestApi/resources/11.13.18.05/deliverables:
    get:
      operationId: listDeliverables
      summary: Oracle Fusion Cloud Applications List deliverables
      description: >-
        Retrieve project deliverable records including task associations
        and requirement linkages.
      tags:
        - Deliverables
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Deliverables retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Deliverable'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createDeliverable
      summary: Oracle Fusion Cloud Applications Create a deliverable
      description: Create a new project deliverable.
      tags:
        - Deliverables
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliverableCreate'
      responses:
        '201':
          description: Deliverable created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deliverable'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/financialProjectPlans:
    get:
      operationId: listFinancialProjectPlans
      summary: Oracle Fusion Cloud Applications List financial project plans
      description: >-
        Retrieve financial project plan versions including budgets,
        forecasts, resource assignments, and planning options.
      tags:
        - Financial Project Plans
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Financial project plans retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FinancialProjectPlan'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createFinancialProjectPlan
      summary: Oracle Fusion Cloud Applications Create a financial project plan
      description: Create a new financial project plan version.
      tags:
        - Financial Project Plans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialProjectPlanCreate'
      responses:
        '201':
          description: Financial project plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialProjectPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/expenditureTypes:
    get:
      operationId: listExpenditureTypes
      summary: Oracle Fusion Cloud Applications List expenditure types
      description: >-
        Retrieve expenditure type definitions used in project costing
        and billing.
      tags:
        - Expenditure Types
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          description: Expenditure types retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenditureType'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/expenditureTypes/{ExpenditureTypeId}:
    get:
      operationId: getExpenditureType
      summary: Oracle Fusion Cloud Applications Get an expenditure type
      description: Retrieve a specific expenditure type definition.
      tags:
        - Expenditure Types
      parameters:
        - name: ExpenditureTypeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Expenditure type details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenditureType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic
  parameters:
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 25
        maximum: 500
    offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
    fields:
      name: fields
      in: query
      required: false
      schema:
        type: string
    q:
      name: q
      in: query
      required: false
      schema:
        type: string
    orderBy:
      name: orderBy
      in: query
      required: false
      schema:
        type: string
    finder:
      name: finder
      in: query
      required: false
      schema:
        type: string
    expand:
      name: expand
      in: query
      required: false
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request parameters or payload
    Unauthorized:
      description: Authentication credentials are missing or invalid
    NotFound:
      description: The requested resource was not found
  schemas:
    Project:
      type: object
      properties:
        ProjectId:
          type: integer
          description: Project identifier
        ProjectNumber:
          type: string
          description: Project number
        ProjectName:
          type: string
          description: Project name
        ProjectDescription:
          type: string
          description: Project description
        ProjectType:
          type: string
          description: Project type classification
        ProjectStatus:
          type: string
          description: Current project status
          enum:
            - Submitted
            - Active
            - On Hold
            - Closed
            - Pending Close
        ProjectOrganization:
          type: string
          description: Owning organization
        ProjectManager:
          type: string
          description: Project manager name
        StartDate:
          type: string
          format: date
          description: Project start date
        EndDate:
          type: string
          format: date
          description: Project end date
        LegalEntity:
          type: string
          description: Legal entity name
        BusinessUnit:
          type: string
          description: Business unit name
        CurrencyCode:
          type: string
          description: Project currency
        CreationDate:
          type: string
          format: date-time
    ProjectCreate:
      type: object
      required:
        - ProjectName
        - ProjectOrganization
        - StartDate
      properties:
        ProjectName:
          type: string
        ProjectDescription:
          type: string
        ProjectType:
          type: string
        ProjectOrganization:
          type: string
        ProjectManager:
          type: string
        StartDate:
          type: string
          format: date
        EndDate:
          type: string
          format: date
        LegalEntity:
          type: string
        BusinessUnit:
          type: string
        CurrencyCode:
          type: string
    ProjectUpdate:
      type: object
      properties:
        ProjectName:
          type: string
        ProjectDescription:
          type: string
        ProjectStatus:
          type: string
        ProjectManager:
          type: string
        EndDate:
          type: string
          format: date
    ProjectTask:
      type: object
      properties:
        TaskId:
          type: integer
          description: Task identifier
        TaskNumber:
          type: string
          description: Task number
        TaskName:
          type: string
          description: Task name
        ProjectId:
          type: integer
          description: Parent project identifier
        ProjectNumber:
          type: string
          description: Parent project number
        ParentTaskId:
          type: integer
          description: Parent task identifier for hierarchy
        StartDate:
          type: string
          format: date
          description: Task start date
        EndDate:
          type: string
          format: date
          description: Task end date
        TaskLevel:
          type: integer
          description: Task level in hierarchy
        PlannedEfffort:
          type: number
          format: double
          description: Planned effort
        ActualEffort:
          type: number
          format: double
          description: Actual effort
        PercentComplete:
          type: number
          format: double
          description: Completion percentage
        TaskStatus:
          type: string
          description: Task status
    ProjectTaskCreate:
      type: object
      required:
        - TaskName
        - ProjectId
        - StartDate
      properties:
        TaskName:
          type: string
        ProjectId:
          type: integer
        ParentTaskId:
          type: integer
        StartDate:
          type: string
          format: date
        EndDate:
          type: string
          format: date
        PlannedEffort:
          type: number
          format: double
    Award:
      type: object
      properties:
        AwardId:
          type: integer
          description: Award identifier
        AwardNumber:
          type: string
          description: Award number
        AwardName:
          type: string
          description: Award name
        AwardType:
          type: string
          description: Type of award
        SponsorName:
          type: string
          description: Sponsor or funding agency name
        AwardStatus:
          type: string
          description: Award status
          enum:
            - Active
            - On Hold
