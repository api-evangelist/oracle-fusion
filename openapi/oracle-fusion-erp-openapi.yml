openapi: 3.1.0
info:
  title: Oracle Fusion Cloud Applications Oracle Fusion Cloud ERP REST API
  description: >-
    REST APIs for Oracle Fusion Cloud ERP, providing programmatic access to
    financials, procurement, project management, and risk management
    capabilities. The API supports viewing and managing financial data
    including general ledger, accounts payable, accounts receivable, fixed
    assets, cash management, expense reports, and ERP integrations.
  version: 11.13.18.05
  contact:
    name: Oracle Support
    url: https://support.oracle.com
    email: support@oracle.com
  license:
    name: Oracle Cloud Services Agreement
    url: https://www.oracle.com/corporate/contracts/cloud-services/
  termsOfService: https://www.oracle.com/corporate/contracts/cloud-services/
externalDocs:
  description: Oracle Fusion Cloud Financials REST API Documentation
  url: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
servers:
  - url: https://{instance}.oraclecloud.com
    description: Oracle Fusion Cloud Instance
    variables:
      instance:
        default: servername
        description: Your Oracle Cloud instance identifier
tags:
  - name: Invoices
    description: Manage accounts payable invoices
  - name: Payments
    description: Manage payment processing
  - name: General Ledger
    description: General ledger journal and period operations
  - name: Accounts Receivable
    description: Manage receivables transactions and receipts
  - name: Expense Reports
    description: Create and manage employee expense reports
  - name: Cash Management
    description: Bank accounts, transfers, and cash pools
  - name: Budgetary Control
    description: Budget transactions and validation
  - name: ERP Integrations
    description: Bulk data import and export operations
  - name: Currency Rates
    description: Currency rate management
security:
  - bearerAuth: []
paths:
  /fscmRestApi/resources/11.13.18.05/invoices:
    get:
      operationId: listInvoices
      summary: Oracle Fusion Cloud Applications List invoices
      description: >-
        Retrieve a collection of accounts payable invoices. Supports filtering,
        sorting, and pagination using standard Oracle REST query parameters.
      tags:
        - Invoices
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/finder'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: Successful retrieval of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  count:
                    type: integer
                    description: Number of items returned
                  hasMore:
                    type: boolean
                    description: Whether more items are available
                  limit:
                    type: integer
                    description: Maximum number of items returned
                  offset:
                    type: integer
                    description: Offset of first item returned
                  totalResults:
                    type: integer
                    description: Total number of matching items
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createInvoice
      summary: Oracle Fusion Cloud Applications Create an invoice
      description: >-
        Create a new accounts payable invoice with header and optionally
        include invoice lines and distributions.
      tags:
        - Invoices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreate'
      responses:
        '201':
          description: Invoice created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/invoices/{InvoiceId}:
    get:
      operationId: getInvoice
      summary: Oracle Fusion Cloud Applications Get an invoice
      description: Retrieve a specific accounts payable invoice by its unique identifier.
      tags:
        - Invoices
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateInvoice
      summary: Oracle Fusion Cloud Applications Update an invoice
      description: Update an existing accounts payable invoice.
      tags:
        - Invoices
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceUpdate'
      responses:
        '200':
          description: Invoice updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteInvoice
      summary: Oracle Fusion Cloud Applications Delete an invoice
      description: Delete an accounts payable invoice.
      tags:
        - Invoices
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      responses:
        '204':
          description: Invoice deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /fscmRestApi/resources/11.13.18.05/payablesPayments:
    get:
      operationId: listPayments
      summary: Oracle Fusion Cloud Applications List payments
      description: >-
        Retrieve a collection of accounts payable payments including check,
        electronic, and wire transfer payments.
      tags:
        - Payments
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Successful retrieval of payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
                  totalResults:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/payablesPayments/{PaymentId}:
    get:
      operationId: getPayment
      summary: Oracle Fusion Cloud Applications Get a payment
      description: Retrieve a specific payment by its unique identifier.
      tags:
        - Payments
      parameters:
        - name: PaymentId
          in: path
          required: true
          description: Unique identifier for the payment
          schema:
            type: integer
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /fscmRestApi/resources/11.13.18.05/ledgerBalances:
    get:
      operationId: listLedgerBalances
      summary: Oracle Fusion Cloud Applications List ledger balances
      description: >-
        Retrieve general ledger account balances. Use query parameters to
        filter by ledger, period, account segment values, and currency.
      tags:
        - General Ledger
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Ledger balances retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/LedgerBalance'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/generalLedgerJournals:
    get:
      operationId: listJournals
      summary: Oracle Fusion Cloud Applications List general ledger journals
      description: >-
        Retrieve general ledger journal entries. The journals resource
        provides access to journal headers and lines for financial reporting.
      tags:
        - General Ledger
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Journals retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Journal'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createJournal
      summary: Oracle Fusion Cloud Applications Create a general ledger journal
      description: >-
        Create a new general ledger journal entry with header and lines.
      tags:
        - General Ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalCreate'
      responses:
        '201':
          description: Journal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/generalLedgerPeriodStatuses:
    get:
      operationId: listPeriodStatuses
      summary: Oracle Fusion Cloud Applications List general ledger period statuses
      description: >-
        Retrieve the open, closed, or future status of general ledger
        accounting periods for a specified ledger.
      tags:
        - General Ledger
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Period statuses retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PeriodStatus'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/receivablesInvoices:
    get:
      operationId: listReceivablesInvoices
      summary: Oracle Fusion Cloud Applications List receivables invoices
      description: >-
        Retrieve accounts receivable invoices including debit memos, credit
        memos, and standard invoices.
      tags:
        - Accounts Receivable
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Receivables invoices retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReceivablesInvoice'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createReceivablesInvoice
      summary: Oracle Fusion Cloud Applications Create a receivables invoice
      description: Create a new accounts receivable transaction.
      tags:
        - Accounts Receivable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceivablesInvoiceCreate'
      responses:
        '201':
          description: Receivables invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceivablesInvoice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/standardReceipts:
    get:
      operationId: listReceipts
      summary: Oracle Fusion Cloud Applications List standard receipts
      description: >-
        Retrieve standard receipt records for accounts receivable payments
        received from customers.
      tags:
        - Accounts Receivable
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Receipts retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StandardReceipt'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createReceipt
      summary: Oracle Fusion Cloud Applications Create a standard receipt
      description: Create a new standard receipt for an accounts receivable payment.
      tags:
        - Accounts Receivable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StandardReceiptCreate'
      responses:
        '201':
          description: Receipt created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardReceipt'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/expenseReports:
    get:
      operationId: listExpenseReports
      summary: Oracle Fusion Cloud Applications List expense reports
      description: Retrieve a collection of employee expense reports.
      tags:
        - Expense Reports
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Expense reports retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseReport'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createExpenseReport
      summary: Oracle Fusion Cloud Applications Create an expense report
      description: Create a new employee expense report with expense items.
      tags:
        - Expense Reports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseReportCreate'
      responses:
        '201':
          description: Expense report created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/expenseReports/{ExpenseReportId}:
    get:
      operationId: getExpenseReport
      summary: Oracle Fusion Cloud Applications Get an expense report
      description: Retrieve a specific expense report by its identifier.
      tags:
        - Expense Reports
      parameters:
        - name: ExpenseReportId
          in: path
          required: true
          description: Unique identifier for the expense report
          schema:
            type: integer
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: Expense report details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateExpenseReport
      summary: Oracle Fusion Cloud Applications Update an expense report
      description: Update an existing expense report.
      tags:
        - Expense Reports
      parameters:
        - name: ExpenseReportId
          in: path
          required: true
          description: Unique identifier for the expense report
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseReportCreate'
      responses:
        '200':
          description: Expense report updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteExpenseReport
      summary: Oracle Fusion Cloud Applications Delete an expense report
      description: Delete an expense report.
      tags:
        - Expense Reports
      parameters:
        - name: ExpenseReportId
          in: path
          required: true
          description: Unique identifier for the expense report
          schema:
            type: integer
      responses:
        '204':
          description: Expense report deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /fscmRestApi/resources/11.13.18.05/cashBankAccounts:
    get:
      operationId: listBankAccounts
      summary: Oracle Fusion Cloud Applications List bank accounts
      description: View, create, and modify bank accounts for cash management.
      tags:
        - Cash Management
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Bank accounts retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BankAccount'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/cashBankAccountTransfers:
    get:
      operationId: listBankAccountTransfers
      summary: Oracle Fusion Cloud Applications List bank account transfers
      description: >-
        Retrieve bank account transfer records for cash management.
      tags:
        - Cash Management
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          description: Transfers retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BankAccountTransfer'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createBankAccountTransfer
      summary: Oracle Fusion Cloud Applications Create a bank account transfer
      description: Create a new bank account transfer.
      tags:
        - Cash Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountTransferCreate'
      responses:
        '201':
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountTransfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/budgetaryControlBudgetTransactions:
    get:
      operationId: listBudgetTransactions
      summary: Oracle Fusion Cloud Applications List budget transactions
      description: >-
        Retrieve budgetary control budget transactions and validation results.
      tags:
        - Budgetary Control
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Budget transactions retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BudgetTransaction'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createBudgetTransaction
      summary: Oracle Fusion Cloud Applications Create a budget transaction
      description: >-
        Create budget entries and perform budgetary control validation.
      tags:
        - Budgetary Control
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetTransactionCreate'
      responses:
        '201':
          description: Budget transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetTransaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/erpintegrations:
    post:
      operationId: submitErpIntegration
      summary: Oracle Fusion Cloud Applications Submit an ERP integration
      description: >-
        Automate bulk data import and export flows for ERP integrations
        using file-based data import (FBDI) and business intelligence (BI)
        report jobs.
      tags:
        - ERP Integrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErpIntegrationRequest'
      responses:
        '201':
          description: Integration job submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErpIntegrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /fscmRestApi/resources/11.13.18.05/currencyRates:
    get:
      operationId: listCurrencyRates
      summary: Oracle Fusion Cloud Applications List currency rates
      description: >-
        Retrieve currency exchange rates and available rate dates for
        cross-currency financial operations.
      tags:
        - Currency Rates
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Currency rates retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CurrencyRate'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 bearer token or basic authentication. Oracle Fusion Cloud
        supports both OAuth 2.0 and HTTP Basic authentication for REST API
        access.
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication with Oracle Fusion Cloud credentials
  parameters:
    InvoiceId:
      name: InvoiceId
      in: path
      required: true
      description: Unique identifier for the invoice
      schema:
        type: integer
    limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return (default 25, max 500)
      schema:
        type: integer
        default: 25
        maximum: 500
    offset:
      name: offset
      in: query
      required: false
      description: Number of items to skip before returning results
      schema:
        type: integer
        default: 0
    fields:
      name: fields
      in: query
      required: false
      description: >-
        Comma-separated list of fields to include in the response. Use to
        limit returned attributes for performance.
      schema:
        type: string
    q:
      name: q
      in: query
      required: false
      description: >-
        Filter expression using Oracle REST query syntax. Example:
        InvoiceNumber='INV-001' or InvoiceAmount>1000
      schema:
        type: string
    orderBy:
      name: orderBy
      in: query
      required: false
      description: >-
        Comma-separated list of fields to sort by. Append :asc or :desc for
        sort direction.
      schema:
        type: string
    finder:
      name: finder
      in: query
      required: false
      description: >-
        Named finder to execute. Format is FinderName;param1=value1,param2=value2
      schema:
        type: string
    expand:
      name: expand
      in: query
      required: false
      description: >-
        Comma-separated list of child resources to include in the response.
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request parameters or payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication credentials are missing or invalid
      content:
        application/json:
