openapi: 3.1.0
info:
  title: Oracle Fusion Cloud Applications Oracle Fusion Common Features REST Absences Work Orders API
  description: REST APIs for Oracle Fusion Cloud Applications Common features, providing access to shared services such as attachments, flexfields, lookup types, roles, users, security, scheduled processes, announcements, and approval workflows used across all Fusion Cloud application pillars.
  version: 11.13.18.05
  contact:
    name: Oracle Support
    url: https://support.oracle.com
    email: support@oracle.com
  license:
    name: Oracle Cloud Services Agreement
    url: https://www.oracle.com/corporate/contracts/cloud-services/
  termsOfService: https://www.oracle.com/corporate/contracts/cloud-services/
servers:
- url: https://{instance}.oraclecloud.com
  description: Oracle Fusion Cloud Instance
  variables:
    instance:
      default: servername
      description: Your Oracle Cloud instance identifier
security:
- bearerAuth: []
tags:
- name: Work Orders
  description: Manufacturing work order management
paths:
  /fscmRestApi/resources/11.13.18.05/workOrders:
    get:
      operationId: listWorkOrders
      summary: Oracle Fusion Cloud Applications List work orders
      description: Retrieve manufacturing work orders including operations, materials, and production status.
      tags:
      - Work Orders
      parameters:
      - $ref: '#/components/parameters/limit'
      - $ref: '#/components/parameters/offset'
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/q'
      - $ref: '#/components/parameters/finder'
      responses:
        '200':
          description: Work orders retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkOrder'
                  count:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createWorkOrder
      summary: Oracle Fusion Cloud Applications Create a work order
      description: Create a new manufacturing work order.
      tags:
      - Work Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkOrderCreate'
      responses:
        '201':
          description: Work order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  parameters:
    q:
      name: q
      in: query
      required: false
      schema:
        type: string
    offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
    fields:
      name: fields
      in: query
      required: false
      schema:
        type: string
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 25
        maximum: 500
    finder:
      name: finder
      in: query
      required: false
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request parameters or payload
    Unauthorized:
      description: Authentication credentials are missing or invalid
  schemas:
    WorkOrder:
      type: object
      properties:
        WorkOrderId:
          type: integer
          description: Work order identifier
        WorkOrderNumber:
          type: string
          description: Work order number
        WorkOrderType:
          type: string
          description: Work order type
        OrganizationCode:
          type: string
          description: Manufacturing organization code
        ItemNumber:
          type: string
          description: Item being manufactured
        ItemDescription:
          type: string
          description: Item description
        PlannedQuantity:
          type: number
          format: double
          description: Planned production quantity
        CompletedQuantity:
          type: number
          format: double
          description: Completed quantity
        UnitOfMeasure:
          type: string
          description: Unit of measure
        PlannedStartDate:
          type: string
          format: date
          description: Planned start date
        PlannedCompletionDate:
          type: string
          format: date
          description: Planned completion date
        ActualStartDate:
          type: string
          format: date
          description: Actual start date
        ActualCompletionDate:
          type: string
          format: date
          description: Actual completion date
        Status:
          type: string
          description: Work order status
          enum:
          - Unreleased
          - Released
          - On Hold
          - Complete
          - Closed
          - Cancelled
    WorkOrderCreate:
      type: object
      required:
      - OrganizationCode
      - ItemNumber
      - PlannedQuantity
      - UnitOfMeasure
      properties:
        WorkOrderType:
          type: string
        OrganizationCode:
          type: string
        ItemNumber:
          type: string
        PlannedQuantity:
          type: number
          format: double
        UnitOfMeasure:
          type: string
        PlannedStartDate:
          type: string
          format: date
        PlannedCompletionDate:
          type: string
          format: date
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic
externalDocs:
  description: Oracle Fusion Cloud Applications Common Features REST API Documentation
  url: https://docs.oracle.com/en/cloud/saas/applications-common/26a/farca/index.html
