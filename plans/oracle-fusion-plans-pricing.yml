specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle Fusion Cloud Applications
providerId: oracle-fusion
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud
  - ERP
  - HCM
  - SaaS
  - SCM
description: >-
  Oracle Fusion Cloud Applications is the umbrella SaaS suite covering ERP,
  HCM, SCM, CX, and EPM. Each pillar is sold separately on the Oracle Cloud
  Applications price list, billed per Hosted Named User, Hosted Employee, or
  Hosted Single-Sign-On Employee per month depending on the module. Some
  modules (e.g. Procurement Contracts, Project Management) use additional
  per-transaction or per-record metrics. There is no single combined "Fusion"
  SKU and no public per-API tier; REST API access is included with any active
  pillar subscription. Engage Oracle Sales for the per-pillar rate.
sources:
  - https://www.oracle.com/applications/cloud/
  - https://docs.oracle.com/en/cloud/saas/
  - https://www.oracle.com/applications/customer-experience/contact/
notes: >-
  Oracle blocks programmatic fetches of www.oracle.com pricing pages (HTTP 403).
  Plan structure preserved as one subscription per pillar plus an enterprise
  bundle; replace per-user list prices with the verified Oracle Applications
  Global Price List values when available.
plans:
  - id: oracle-fusion-pillar-subscription
    name: Fusion Pillar Subscription (per pillar)
    type: subscription
    description: >-
      Per-pillar SaaS subscription (ERP, HCM, SCM, CX, or EPM), billed monthly
      against a Hosted Named User, Hosted Employee, or Hosted Single-Sign-On
      Employee metric. REST API surface for the pillar is included.
    entries:
      - label: Hosted Named User (per pillar)
        name: hosted_named_user
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Hosted Employee (per pillar)
        name: hosted_employee
        type: subscription
        metric: employee
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Hosted Single-Sign-On Employee
        name: hosted_sso_employee
        type: subscription
        metric: employee
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: REST API Calls (included)
        name: rest_api_calls
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Oracle Fusion ERP REST API
      - name: Oracle Fusion HCM REST API
      - name: Oracle Fusion SCM REST API
      - name: Oracle Fusion CX Sales and Fusion Service REST API
      - name: Oracle Fusion Common Features REST API
      - name: Oracle Fusion Project Management REST API
      - name: Oracle Fusion EPM REST API
  - id: oracle-fusion-enterprise
    name: Enterprise Multi-Pillar Agreement
    type: enterprise
    description: >-
      Negotiated multi-pillar enterprise agreement covering several Fusion
      pillars under a single contract. Includes contractual SLAs, dedicated
      pod options, security review, and named technical account management.
    entries:
      - label: Negotiated Multi-Pillar User Volume
        name: negotiated_users
        type: subscription
        metric: user
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: true
    elements:
      - name: Oracle Fusion ERP REST API
      - name: Oracle Fusion HCM REST API
      - name: Oracle Fusion SCM REST API
      - name: Oracle Fusion CX Sales and Fusion Service REST API
      - name: Oracle Fusion Common Features REST API
      - name: Oracle Fusion Project Management REST API
      - name: Oracle Fusion EPM REST API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
