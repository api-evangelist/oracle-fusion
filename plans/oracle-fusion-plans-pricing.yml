specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle Fusion Cloud Applications
providerId: oracle-fusion
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Cloud
  - CX
  - Enterprise
  - EPM
  - ERP
  - HCM
  - Project Management
  - REST API
  - SaaS
  - SCM
description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: oracle-fusion-free
    name: Free
    type: freemium
    description: Free entry tier for the Oracle Fusion Cloud Applications API surface. Intended for evaluation,
      prototyping, and low-volume integrations. Real limits and pricing must be reconciled with the provider's
      published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://{instance}.oraclecloud.com/fscmRestApi/
          - https://{instance}.oraclecloud.com/hcmRestApi/
          - https://{instance}.oraclecloud.com/crmRestApi/
          - https://{instance}.oraclecloud.com/HyperionPlanning/rest/
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://{instance}.oraclecloud.com/fscmRestApi/
          - https://{instance}.oraclecloud.com/hcmRestApi/
          - https://{instance}.oraclecloud.com/crmRestApi/
          - https://{instance}.oraclecloud.com/HyperionPlanning/rest/
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: Oracle Fusion ERP REST API
      - name: Oracle Fusion HCM REST API
      - name: Oracle Fusion SCM REST API
      - name: Oracle Fusion CX Sales and Fusion Service REST API
      - name: Oracle Fusion Common Features REST API
      - name: Oracle Fusion Project Management REST API
      - name: Oracle Fusion EPM REST API
  - id: oracle-fusion-pro
    name: Professional
    type: paid
    description: Production tier for Oracle Fusion Cloud Applications. Provides higher quotas, priority
      support, and access to the broader API portfolio. Pricing placeholder; align with the provider's
      pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://{instance}.oraclecloud.com/fscmRestApi/
          - https://{instance}.oraclecloud.com/hcmRestApi/
          - https://{instance}.oraclecloud.com/crmRestApi/
          - https://{instance}.oraclecloud.com/HyperionPlanning/rest/
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://{instance}.oraclecloud.com/fscmRestApi/
          - https://{instance}.oraclecloud.com/hcmRestApi/
          - https://{instance}.oraclecloud.com/crmRestApi/
          - https://{instance}.oraclecloud.com/HyperionPlanning/rest/
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage
        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://{instance}.oraclecloud.com/fscmRestApi/
          - https://{instance}.oraclecloud.com/hcmRestApi/
          - https://{instance}.oraclecloud.com/crmRestApi/
          - https://{instance}.oraclecloud.com/HyperionPlanning/rest/
        unit: 1000
        price: TBD
        userMultiplied: false
    elements:
      - name: All Production Endpoints
      - name: Email Support
      - name: SLA Targets
      - name: Webhook Subscriptions
      - name: Oracle Fusion ERP REST API
      - name: Oracle Fusion HCM REST API
      - name: Oracle Fusion SCM REST API
      - name: Oracle Fusion CX Sales and Fusion Service REST API
      - name: Oracle Fusion Common Features REST API
      - name: Oracle Fusion Project Management REST API
      - name: Oracle Fusion EPM REST API
  - id: oracle-fusion-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Oracle Fusion Cloud Applications. Includes dedicated capacity,
      contractual SLAs, security review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://{instance}.oraclecloud.com/fscmRestApi/
          - https://{instance}.oraclecloud.com/hcmRestApi/
          - https://{instance}.oraclecloud.com/crmRestApi/
          - https://{instance}.oraclecloud.com/HyperionPlanning/rest/
        unit: 1
        price: custom
        userMultiplied: false
      - label: Rate Limit
        description: Negotiated burst and steady-state rate
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 1000
        timeFrame: minute
        geo: configurable
        domains:
          - https://{instance}.oraclecloud.com/fscmRestApi/
          - https://{instance}.oraclecloud.com/hcmRestApi/
          - https://{instance}.oraclecloud.com/crmRestApi/
          - https://{instance}.oraclecloud.com/HyperionPlanning/rest/
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Unlimited / Negotiated Volume
      - name: 24/7 Dedicated Support
      - name: Contractual SLA
      - name: Security & Compliance Review
      - name: Dedicated Account Manager
      - name: Custom Data Residency
      - name: Oracle Fusion ERP REST API
      - name: Oracle Fusion HCM REST API
      - name: Oracle Fusion SCM REST API
      - name: Oracle Fusion CX Sales and Fusion Service REST API
      - name: Oracle Fusion Common Features REST API
      - name: Oracle Fusion Project Management REST API
      - name: Oracle Fusion EPM REST API
