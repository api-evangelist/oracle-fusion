aid: oracle-fusion
name: Oracle Fusion Cloud Applications
description: >-
  Oracle Fusion Cloud Applications represent a comprehensive suite of
  cloud-based enterprise resource planning (ERP), human capital management
  (HCM), customer experience (CX), supply chain management (SCM), and
  enterprise performance management (EPM) solutions. Oracle Fusion Cloud
  provides REST APIs across all application pillars, enabling programmatic
  access to business data and processes for integration, automation, and
  extension of cloud applications.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
created: '2024-01-15'
modified: '2026-04-28'
specificationVersion: '0.19'
url: >-
  https://raw.githubusercontent.com/api-evangelist/oracle-fusion/refs/heads/main/apis.yml
apis:
  - name: Oracle Fusion ERP REST API
    description: >-
      REST APIs for Oracle Fusion Cloud ERP, providing programmatic access to
      financials, procurement, project management, and risk management
      capabilities. The API supports viewing and managing financial data
      including general ledger, accounts payable, accounts receivable, fixed
      assets, and cash management.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/
    tags:
      - ERP
      - Financials
      - Procurement
      - Projects
      - Risk Management
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
      - type: OpenAPI
        url: https://docs.oracle.com/en/cloud/saas/financials/22r3/farfa/api-rest-api.html
      - type: Authentication
        url: https://docs.oracle.com/en/cloud/saas/financials/22r3/farfa/Authentication.html
      - type: GettingStarted
        url: https://docs.oracle.com/en/cloud/saas/financials/26a/index.html
      - type: ChangeLog
        url: https://docs.oracle.com/en/cloud/saas/readiness/erp/index.html
      - type: OpenAPI
        url: openapi/oracle-fusion-erp-openapi.yml
    contact:
      - FN: Oracle Support
        email: support@oracle.com
        url: https://support.oracle.com
  - name: Oracle Fusion HCM REST API
    description: >-
      REST APIs for Oracle Fusion Cloud Human Capital Management, enabling
      integration with core HR, talent management, workforce management, and
      payroll systems. The API provides access to employee records, absence
      management, benefits, compensation, recruiting, and learning resources.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/human-resources/
    baseURL: https://{instance}.oraclecloud.com/hcmRestApi/
    tags:
      - HCM
      - Human Resources
      - Payroll
      - Talent Management
      - Workforce
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/human-resources/22r3/farws/
      - type: OpenAPI
        url: https://docs.oracle.com/en/cloud/saas/human-resources/22r3/farws/api-rest-api.html
      - type: Authentication
        url: https://docs.oracle.com/en/cloud/saas/human-resources/22r3/farws/Authentication.html
      - type: GettingStarted
        url: https://docs.oracle.com/en/cloud/saas/human-resources/26a/index.html
      - type: ChangeLog
        url: https://docs.oracle.com/en/cloud/saas/readiness/hcm/index.html
      - type: OpenAPI
        url: openapi/oracle-fusion-hcm-openapi.yml
    contact:
      - FN: Oracle Support
        email: support@oracle.com
        url: https://support.oracle.com
  - name: Oracle Fusion SCM REST API
    description: >-
      REST APIs for Oracle Fusion Cloud Supply Chain Management, providing
      access to inventory, order management, procurement, logistics, and
      manufacturing capabilities. The API enables integration with supply
      chain planning, product lifecycle management, service logistics, and
      supply chain execution processes.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/supply-chain-management/
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/
    tags:
      - Inventory
      - Logistics
      - Manufacturing
      - Order Management
      - SCM
      - Supply Chain
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/supply-chain-management/22r3/fasrs/
      - type: OpenAPI
        url: https://docs.oracle.com/en/cloud/saas/supply-chain-management/22r3/fasrs/api-rest-api.html
      - type: Authentication
        url: https://docs.oracle.com/en/cloud/saas/supply-chain-management/22r3/fasrs/Authentication.html
