      - type: OpenAPI
        url: openapi/oracle-fusion-scm-openapi.yml
    contact:
      - FN: Oracle Support
        email: support@oracle.com
        url: https://support.oracle.com
  - name: Oracle Fusion CX Sales and Fusion Service REST API
    description: >-
      REST APIs for Oracle Fusion Cloud Customer Experience, enabling
      integration with sales force automation, fusion service, customer data
      management, and commerce applications. The API provides access to
      accounts, contacts, opportunities, leads, service requests, activities,
      and other CRM resources.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/sales/
    baseURL: https://{instance}.oraclecloud.com/crmRestApi/
    tags:
      - Commerce
      - Customer Experience
      - CX
      - Marketing
      - Sales
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/sales/faaps/index.html
      - type: OpenAPI
        url: https://docs.oracle.com/en/cloud/saas/cx-sales/rest-api.html
      - type: Authentication
        url: https://docs.oracle.com/en/cloud/saas/cx-sales/rest-authentication.html
      - type: GettingStarted
