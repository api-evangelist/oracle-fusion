      - type: ChangeLog
        url: https://docs.oracle.com/en/cloud/saas/readiness/sales.html
      - type: OpenAPI
        url: openapi/oracle-fusion-cx-sales-openapi.yml
    contact:
      - FN: Oracle Support
        email: support@oracle.com
        url: https://support.oracle.com
  - name: Oracle Fusion Common Features REST API
    description: >-
      REST APIs for Oracle Fusion Cloud Applications Common features, providing
      access to shared services such as attachments, flexfields, lookup types,
      roles, users, security, and approval workflows used across all Fusion
      Cloud application pillars. This is the foundational API that supports
      cross-pillar integration capabilities.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/applications-common/
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/
    tags:
      - Attachments
      - Common
      - Flexfields
      - Roles
      - Security
      - Users
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/applications-common/26a/farca/index.html
      - type: GettingStarted
        url: https://docs.oracle.com/en/cloud/saas/applications-common/26a/index.html
      - type: OpenAPI
        url: openapi/oracle-fusion-common-openapi.yml
    contact:
      - FN: Oracle Support
        email: support@oracle.com
        url: https://support.oracle.com
  - name: Oracle Fusion Project Management REST API
    description: >-
      REST APIs for Oracle Fusion Cloud Project Management, enabling
      integration with project planning, project costing, project billing,
      grants management, and project execution capabilities. The API supports
      managing project resources, tasks, budgets, and deliverables.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/project-management/
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/
    tags:
      - Grants
      - Project Billing
      - Project Costing
      - Project Management
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/project-management/26a/fapap/index.html
      - type: GettingStarted
        url: https://docs.oracle.com/en/cloud/saas/project-management/26a/index.html
      - type: ChangeLog
        url: https://docs.oracle.com/en/cloud/saas/readiness/erp/index.html
      - type: OpenAPI
        url: openapi/oracle-fusion-project-management-openapi.yml
    contact:
      - FN: Oracle Support
        email: support@oracle.com
        url: https://support.oracle.com
  - name: Oracle Fusion EPM REST API
    description: >-
      REST APIs for Oracle Fusion Cloud Enterprise Performance Management,
      enabling integration with planning, budgeting, forecasting, financial
      consolidation, account reconciliation, tax reporting, and narrative
      reporting capabilities. The EPM REST APIs allow infrastructure
      consultants to integrate environments with Oracle EPM Cloud services.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/enterprise-performance-management-common/
    baseURL: https://{instance}.oraclecloud.com/HyperionPlanning/rest/
    tags:
      - Budgeting
      - Consolidation
      - EPM
      - Financial Close
      - Planning
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/enterprise-performance-management-common/prest/index.html
      - type: GettingStarted
        url: https://docs.oracle.com/en/cloud/saas/epm-cloud/index.html
      - type: OpenAPI
        url: openapi/oracle-fusion-epm-openapi.yml
    contact:
      - FN: Oracle Support
        email: support@oracle.com
        url: https://support.oracle.com
